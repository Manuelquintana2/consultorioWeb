server {
    listen 80;
    server_name consultorioaguero64.duckdns.org;

    # Ocultar versión de nginx en errores y cabeceras
    server_tokens off;

    # Permitir validaciones de Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirección global a HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name consultorioaguero64.duckdns.org;

    # Ocultar versión de nginx
    server_tokens off;

    # Certificados SSL
    ssl_certificate /etc/letsencrypt/live/consultorioaguero64.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/consultorioaguero64.duckdns.org/privkey.pem;

    # Optimización de seguridad SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    root /usr/share/nginx/html;
    index index.html;

    # Frontend Angular
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API - Manejo de Proxy
    location /api/ {
        proxy_pass http://backendconsul:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Seguridad extra para cookies (evita robos por XSS)
        proxy_cookie_path / "/; HTTPOnly; Secure; SameSite=Strict";

        # Limpieza de cabeceras sensibles
        proxy_hide_header X-Powered-By;
        
        # NOTA: No añadimos 'Access-Control-Allow-Origin' aquí porque 
        # tu backend ya lo está enviando (evitamos duplicados).
    }

    # Carpeta de subidas
    location /uploads/ {
        proxy_pass http://backendconsul:3000/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Evitar que se ejecuten scripts en la carpeta de subidas (Seguridad)
        proxy_hide_header X-Powered-By;
    }
}
